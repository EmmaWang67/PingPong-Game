<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- Proper iPhone scaling and fullscreen -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Table Tennis Game</title>

<style>
html,body{
margin:0;
padding:0;
background:#111;
color:white;
font-family:Arial;
height:100%;
overflow:hidden;
}

body{
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
}

h1{
margin:8px 0 4px 0;
font-size:22px;
}

#controls{
margin:4px;
text-align:center;
font-size:14px;
}

#gameContainer{
flex:1;
width:100vw;
display:flex;
justify-content:center;
align-items:center;
padding-bottom:env(safe-area-inset-bottom);
}

canvas{
background:#0f5132;
border:3px solid white;

/* Perfect phone fit */
width:100vw;
height:calc(100vw * 0.56);
max-height:75vh;
max-width:1000px;

}

#scoreboard{
margin:6px;
font-size:18px;
}

button,select,input{
font-size:14px;
margin:2px;
}

</style>
</head>

<body>

<h1>🏓 Table Tennis</h1>

<div id="controls">
Difficulty:
<select id="difficulty">
<option value="3">Easy</option>
<option value="5" selected>Medium</option>
<option value="7">Hard</option>
</select>

Points to win:
<input id="winScore" type="number" value="5" min="1" max="20">

<button onclick="startGame()">Start Game</button>
<button onclick="restartGame()">Restart</button>
<button onclick="enterFullscreen()">Fullscreen</button>
</div>

<div id="gameContainer">
<canvas id="game"></canvas>
</div>

<div id="scoreboard">
Player: <span id="playerScore">0</span>
 |
Computer: <span id="computerScore">0</span>
</div>

<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

function resizeCanvas(){
canvas.width=window.innerWidth
canvas.height=canvas.width*0.56

if(canvas.height>window.innerHeight*0.75){
canvas.height=window.innerHeight*0.75
canvas.width=canvas.height/0.56
}
}

resizeCanvas()
window.addEventListener("resize",resizeCanvas)

let paddleHeight=80
let paddleWidth=10

let playerY=canvas.height/2
let computerY=canvas.height/2

let ballX=canvas.width/2
let ballY=canvas.height/2
let ballSpeedX=4
let ballSpeedY=3

let playerScore=0
let computerScore=0
let aiSpeed=5
let winScore=5
let gameRunning=false

function startGame(){
aiSpeed=parseInt(document.getElementById("difficulty").value)
winScore=parseInt(document.getElementById("winScore").value)
playerScore=0
computerScore=0
updateScore()
resetBall()
gameRunning=true
}

function restartGame(){
startGame()
}

function resetBall(){
ballX=canvas.width/2
ballY=canvas.height/2
ballSpeedX*=-1
ballSpeedY=(Math.random()*4)-2
}

function updateScore(){
document.getElementById("playerScore").textContent=playerScore
document.getElementById("computerScore").textContent=computerScore
}

function drawRect(x,y,w,h){
ctx.fillStyle="white"
ctx.fillRect(x,y,w,h)
}

function drawBall(){
ctx.beginPath()
ctx.arc(ballX,ballY,8,0,Math.PI*2)
ctx.fillStyle="white"
ctx.fill()
}

function drawNet(){
for(let i=0;i<canvas.height;i+=20){
ctx.fillRect(canvas.width/2-1,i,2,10)
}
}

function update(){
if(!gameRunning)return

ballX+=ballSpeedX
ballY+=ballSpeedY

if(ballY<0||ballY>canvas.height)ballSpeedY*=-1

if(ballX<20){
if(ballY>playerY && ballY<playerY+paddleHeight){
ballSpeedX*=-1
let deltaY=ballY-(playerY+paddleHeight/2)
ballSpeedY=deltaY*0.25
}else{
computerScore++
updateScore()
checkWin()
resetBall()
}
}

if(ballX>canvas.width-20){
if(ballY>computerY && ballY<computerY+paddleHeight){
ballSpeedX*=-1
let deltaY=ballY-(computerY+paddleHeight/2)
ballSpeedY=deltaY*0.25
}else{
playerScore++
updateScore()
checkWin()
resetBall()
}
}

let computerCenter=computerY+paddleHeight/2
if(computerCenter<ballY)computerY+=aiSpeed
else computerY-=aiSpeed
}

function checkWin(){
if(playerScore>=winScore){
alert("You Win! 🎉")
gameRunning=false
}
if(computerScore>=winScore){
alert("Computer Wins! 🤖")
gameRunning=false
}
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height)

drawNet()

drawRect(10,playerY,paddleWidth,paddleHeight)
drawRect(canvas.width-20,computerY,paddleWidth,paddleHeight)

drawBall()
}

function gameLoop(){
update()
draw()
requestAnimationFrame(gameLoop)
}

gameLoop()

// keyboard controls

document.addEventListener("keydown",e=>{
if(e.key==="ArrowUp")playerY-=30
if(e.key==="ArrowDown")playerY+=30
})

// touch controls

canvas.addEventListener("touchmove",e=>{
let rect=canvas.getBoundingClientRect()
let touchY=e.touches[0].clientY-rect.top
playerY=touchY-paddleHeight/2
})

function enterFullscreen(){
let elem=document.documentElement
if(elem.requestFullscreen){
 elem.requestFullscreen()
}
}

</script>

</body>
</html>
