<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Table Tennis Game</title>
<style>

body{
margin:0;
background:#0b3d2e;
font-family:Arial, Helvetica, sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#container{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
width:100%;
}

/* Responsive canvas for phones */
canvas{
background:#0f5132;
border:4px solid white;
touch-action:none;
width:95vw;
height:calc(95vw * 0.56);
max-width:800px;
max-height:450px;
}

#controls{
display:flex;
gap:15px;
align-items:center;
font-size:14px;
flex-wrap:wrap;
justify-content:center;
}

select,input,button{
padding:6px 8px;
border-radius:5px;
border:none;
font-size:14px;
}

button{
cursor:pointer;
}

#scoreboard{
width:95vw;
max-width:800px;
display:flex;
justify-content:space-between;
font-size:20px;
margin-top:5px;
}

#share{
margin-top:5px;
font-size:14px;
opacity:0.9;
text-align:center;
}

</style>
</head>
<body>

<div id="container">

<div id="controls">

<label>Difficulty:</label>
<select id="difficulty">
<option value="2">Easy</option>
<option value="4" selected>Medium</option>
<option value="7">Hard</option>
</select>

<label>Points to Win:</label>
<input id="maxScore" type="number" value="5" min="1" style="width:60px">

<button onclick="startGame()">Start / Restart</button>

</div>

<canvas id="game" width="800" height="450"></canvas>

<div id="scoreboard">
<div>Player: <span id="playerScore">0</span></div>
<div>Computer: <span id="cpuScore">0</span></div>
</div>

<div id="share">Desktop: ↑ ↓ keys &nbsp;&nbsp; | &nbsp;&nbsp; Mobile: drag finger on screen</div>

</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const paddleWidth = 10;
const paddleHeight = 90;

let aiSpeed = 4;
let winningScore = 5;
let gameOver = false;

const player = {
    x: 10,
    y: 180,
    dy: 0,
    score: 0
};

const cpu = {
    x: canvas.width - 20,
    y: 180,
    score: 0
};

const ball = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    dx: 5,
    dy: 3,
    r: 8
};

function startGame(){

aiSpeed = parseInt(document.getElementById("difficulty").value);
winningScore = parseInt(document.getElementById("maxScore").value);

player.score = 0;
cpu.score = 0;

updateScore();

gameOver = false;

resetBall();
}

function drawRect(x,y,w,h){
ctx.fillStyle = "white";
ctx.fillRect(x,y,w,h);
}

function drawBall(){
ctx.beginPath();
ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
ctx.fillStyle = "white";
ctx.fill();
}

function drawNet(){
for(let i=0;i<canvas.height;i+=20){
ctx.fillRect(canvas.width/2-1,i,2,10);
}
}

function resetBall(){
ball.x = canvas.width/2;
ball.y = canvas.height/2;
ball.dx = Math.random()>0.5 ? 5 : -5;
ball.dy = (Math.random()*4)-2;
}

function updateScore(){

document.getElementById("playerScore").innerText = player.score;
document.getElementById("cpuScore").innerText = cpu.score;

}

function checkWinner(){

if(player.score >= winningScore){
alert("You Win! 🎉");
gameOver = true;
}

if(cpu.score >= winningScore){
alert("Computer Wins! 🤖");
gameOver = true;
}

}

function update(){

if(gameOver) return;

player.y += player.dy;

if(player.y < 0) player.y = 0;
if(player.y + paddleHeight > canvas.height)
player.y = canvas.height - paddleHeight;

let cpuCenter = cpu.y + paddleHeight/2;

if(cpuCenter < ball.y) cpu.y += aiSpeed;
else cpu.y -= aiSpeed;

ball.x += ball.dx;
ball.y += ball.dy;

if(ball.y < 0 || ball.y > canvas.height) ball.dy *= -1;

if(ball.x < player.x + paddleWidth &&
   ball.y > player.y &&
   ball.y < player.y + paddleHeight){

   let collidePoint = ball.y - (player.y + paddleHeight/2);
   collidePoint = collidePoint / (paddleHeight/2);

   ball.dy = collidePoint * 5;
   ball.dx *= -1;
}

if(ball.x > cpu.x &&
   ball.y > cpu.y &&
   ball.y < cpu.y + paddleHeight){

   let collidePoint = ball.y - (cpu.y + paddleHeight/2);
   collidePoint = collidePoint / (paddleHeight/2);

   ball.dy = collidePoint * 5;
   ball.dx *= -1;
}

if(ball.x < 0){

cpu.score++;
updateScore();
checkWinner();
resetBall();

}

if(ball.x > canvas.width){

player.score++;
updateScore();
checkWinner();
resetBall();

}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawNet();

drawRect(player.x, player.y, paddleWidth, paddleHeight);
drawRect(cpu.x, cpu.y, paddleWidth, paddleHeight);

drawBall();

}

function gameLoop(){
update();
draw();
requestAnimationFrame(gameLoop);
}

/* Keyboard control for desktop */
window.addEventListener("keydown", e => {

if(e.key === "ArrowUp") player.dy = -6;
if(e.key === "ArrowDown") player.dy = 6;

});

window.addEventListener("keyup", e => {

if(e.key === "ArrowUp" || e.key === "ArrowDown")
player.dy = 0;

});

/* Touch control for phones */
canvas.addEventListener("touchmove", function(e){

let rect = canvas.getBoundingClientRect();
let touch = e.touches[0];
let touchY = touch.clientY - rect.top;

player.y = touchY - paddleHeight/2;

if(player.y < 0) player.y = 0;
if(player.y + paddleHeight > canvas.height)
player.y = canvas.height - paddleHeight;

e.preventDefault();

},{ passive:false });

startGame();
gameLoop();

</script>

</body>
</html>
