<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Table Tennis Game</title>
<style>
body{margin:0;background:#0b3d2e;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial;color:white}
#container{display:flex;flex-direction:column;align-items:center;gap:10px}
canvas{background:#0f5132;border:4px solid #ffffff}
#controls{display:flex;gap:15px;align-items:center;font-size:14px}
select,input,button{padding:5px;border-radius:4px;border:none}
#scoreboard{width:800px;display:flex;justify-content:space-between;font-size:20px;margin-top:5px}
</style>
</head>
<body>

<div id="container">

<div id="controls">
<label>Difficulty:</label>
<select id="difficulty">
<option value="2">Easy</option>
<option value="4" selected>Medium</option>
<option value="6">Hard</option>
</select>

<label>Points to Win:</label>
<input id="maxScore" type="number" value="5" min="1" style="width:60px">

<button onclick="startGame()">Start / Restart</button>
</div>

<canvas id="game" width="800" height="450"></canvas>

<div id="scoreboard">
<div>Player: <span id="playerScore">0</span></div>
<div>Computer: <span id="cpuScore">0</span></div>
</div>

</div>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');

const paddleWidth=10;
const paddleHeight=90;

let aiSpeed=4;
let winningScore=5;
let gameOver=false;

const player={x:10,y:180,dy:0,score:0};
const cpu={x:780,y:180,score:0};

const ball={x:400,y:225,dx:5,dy:3,r:8};

function startGame(){
aiSpeed=parseInt(document.getElementById('difficulty').value);
winningScore=parseInt(document.getElementById('maxScore').value);
player.score=0;
cpu.score=0;
updateScore();
gameOver=false;
resetBall();
}

function drawRect(x,y,w,h){
ctx.fillStyle='white';
ctx.fillRect(x,y,w,h);
}

function drawBall(){
ctx.beginPath();
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
ctx.fillStyle='white';
ctx.fill();
}

function drawNet(){
for(let i=0;i<canvas.height;i+=20){
ctx.fillRect(canvas.width/2-1,i,2,10);
}
}

function resetBall(){
ball.x=canvas.width/2;
ball.y=canvas.height/2;
ball.dx=(Math.random()>0.5?5:-5);
ball.dy=3*(Math.random()>0.5?1:-1);
}

function updateScore(){
document.getElementById('playerScore').innerText=player.score;
document.getElementById('cpuScore').innerText=cpu.score;
}

function update(){
if(gameOver)return;

player.y+=player.dy;

if(player.y<0)player.y=0;
if(player.y+paddleHeight>canvas.height)player.y=canvas.height-paddleHeight;

let cpuCenter=cpu.y+paddleHeight/2;
if(cpuCenter<ball.y)cpu.y+=aiSpeed;
else cpu.y-=aiSpeed;

ball.x+=ball.dx;
ball.y+=ball.dy;

if(ball.y<0||ball.y>canvas.height)ball.dy*=-1;

if(ball.x<player.x+paddleWidth &&
   ball.y>player.y &&
   ball.y<player.y+paddleHeight){
   ball.dx*=-1;
}

if(ball.x>cpu.x &&
   ball.y>cpu.y &&
   ball.y<cpu.y+paddleHeight){
   ball.dx*=-1;
}

if(ball.x<0){
 cpu.score++;
 updateScore();
 checkWinner();
 resetBall();
}

if(ball.x>canvas.width){
 player.score++;
 updateScore();
 checkWinner();
 resetBall();
}
}

function checkWinner(){
if(player.score>=winningScore){
alert('You Win!');
gameOver=true;
}
if(cpu.score>=winningScore){
alert('Computer Wins!');
gameOver=true;
}
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

drawNet();

drawRect(player.x,player.y,paddleWidth,paddleHeight);
drawRect(cpu.x,cpu.y,paddleWidth,paddleHeight);

drawBall();
}

function gameLoop(){
update();
draw();
requestAnimationFrame(gameLoop);
}

window.addEventListener('keydown',e=>{
if(e.key==='ArrowUp')player.dy=-6;
if(e.key==='ArrowDown')player.dy=6;
});

window.addEventListener('keyup',e=>{
if(e.key==='ArrowUp'||e.key==='ArrowDown')player.dy=0;
});

startGame();
gameLoop();
</script>
</body>
</html>
